name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target environment
        required: true
        type: choice
        options:
          - staging
          - production
      commit_sha:
        description: Commit SHA to deploy
        required: false
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (skip type check)
        run: npx vite build

      - name: Deploy
        run: |
          echo "=== Deploying to ${{ inputs.environment }} ==="
          echo "Commit: ${{ inputs.commit_sha || github.sha }}"
          echo "Build output:"
          ls -la dist/
          echo "=== Deploy to ${{ inputs.environment }} complete ==="
