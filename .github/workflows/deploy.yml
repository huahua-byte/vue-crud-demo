name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target environment
        required: true
        type: choice
        options:
          - staging
          - production
      commit_sha:
        description: Commit SHA to deploy
        required: false
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy
        run: |
          echo "=== Deploying to ${{ inputs.environment }} ==="
          echo "Commit: ${{ inputs.commit_sha || github.sha }}"
          ls -la dist/
          echo "=== Deploy success ==="
