name: Deploy
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target environment
        required: true
        type: choice
        options:
          - staging
          - production
      commit_sha:
        description: Commit SHA to deploy
        required: false
        type: string

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Stop old container
        run: docker compose down 2>/dev/null || true

      - name: Build and start
        run: docker compose up -d --build

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:4000 > /dev/null
          echo "Deploy to ${{ inputs.environment }} success — app running at http://localhost:4000"
